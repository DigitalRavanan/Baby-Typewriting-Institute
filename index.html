<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Baby Typewriting Institute</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <h1>Baby Typewriting Institute</h1>

  <div id="register-div">
    <h2>Register & Enroll</h2>
    <input type="email" id="reg-email" placeholder="Email" />
    <input type="password" id="reg-password" placeholder="Password" />
    <select id="course-select">
      <option value="beginner">Beginner Typing</option>
      <option value="advanced">Advanced Typing</option>
      <option value="speed">Speed Typing</option>
    </select>
    <button id="register-btn">Register & Enroll</button>
  </div>

  <hr />

  <div id="login-div">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email" />
    <input type="password" id="login-password" placeholder="Password" />
    <button id="login-btn">Login</button>
  </div>

  <div id="admin-link" style="display:none; margin-top:20px;">
    <h2>Admin Panel</h2>
    <a href="admin.html">Go to Admin Panel</a>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBxS3WRK8kvVMO-q5EO_XvV6bwgm05IVN0",
      authDomain: "baby-typewriting-institu-89e00.firebaseapp.com",
      projectId: "baby-typewriting-institu-89e00",
      storageBucket: "baby-typewriting-institu-89e00.appspot.com",
      messagingSenderId: "873777136115",
      appId: "1:873777136115:web:e40b75d23ec3ffc2fc1286"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById('register-btn').addEventListener('click', () => {
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const course = document.getElementById('course-select').value;

      if (!email || !password) {
        alert('Please enter email and password.');
        return;
      }

      auth.createUserWithEmailAndPassword(email, password)
        .then(userCredential => {
          const user = userCredential.user;
          return db.collection('enrollments').doc(user.uid).set({
            email: email,
            course: course,
            enrolledAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        })
        .then(() => {
          alert('Registered and enrolled successfully! You can now log in.');
          document.getElementById('reg-email').value = '';
          document.getElementById('reg-password').value = '';
        })
        .catch(error => {
          alert('Error: ' + error.message);
        });
    });

    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        alert('Please enter email and password.');
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          const user = userCredential.user;
          alert('Logged in!');

          if (user.email === 'admin@babytyping.com') {
            document.getElementById('admin-link').style.display = 'block';
          } else {
            document.getElementById('admin-link').style.display = 'none';
          }

          document.getElementById('login-email').value = '';
          document.getElementById('login-password').value = '';
        })
        .catch(error => {
          alert('Login failed: ' + error.message);
        });
    });
  </script>
</body>
</html>
