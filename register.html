<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register & Pay</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Load script.js as a module with defer -->
  <script type="module" src="script.js" defer></script>
</head>
<body>
  <h2>Enroll in a Course & Pay Fees</h2>

  <input id="name" placeholder="Full Name" /><br>

  <label for="course-select">Select Course:</label><br>
  <select id="course-select">
    <option value="">--Choose a course--</option>
    <option value="Tamil Typewriting">Tamil Typewriting - ₹1000</option>
    <option value="English Typewriting">English Typewriting - ₹1200</option>
  </select><br>

  <label for="payment-amount">Amount to Pay (₹):</label><br>
  <input id="payment-amount" type="number" placeholder="Enter payment amount" /><br>

  <button onclick="enrollWithPayment()">Enroll & Pay</button>
</body>
</html>
