<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Baby Typewriting Institute</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js" defer></script>
</head>
<body>
  <nav style="background:#004080; padding:10px; color:white; font-family:sans-serif;">
    <a href="index.html" style="color:white; margin-right:15px; text-decoration:none;">Login</a>
    <a href="register.html" style="color:white; margin-right:15px; text-decoration:none;">Enroll</a>
    <a href="dashboard.html" style="color:white; margin-right:15px; text-decoration:none;">Dashboard</a>
    <a href="admin.html" style="color:white; margin-right:15px; text-decoration:none;">Admin</a>
  </nav>

  <div style="padding: 20px; font-family: Arial, sans-serif;">
    <h2>Welcome to Your Dashboard</h2>

    <section style="margin-top:20px;">
      <h3>📍 Attendance</h3>
      <button onclick="checkIn()">Check In</button>
      <button onclick="checkOut()">Check Out</button>
    </section>

    <section style="margin-top:20px;">
      <h3>📅 Request Leave</h3>
      <input type="date" id="leaveDate">
      <input type="text" id="leaveReason" placeholder="Reason">
      <button onclick="requestLeave()">Submit Leave Request</button>
    </section>

    <section style="margin-top:20px;">
      <h3>📊 Attendance History</h3>
      <ul id="attendanceList"></ul>
    </section>

    <section style="margin-top:20px;">
      <h3>👤 Update Profile</h3>
      <input type="text" id="updateName" placeholder="Name">
      <input type="email" id="updateEmail" placeholder="Email">
      <button onclick="updateProfile()">Update</button>
    </section>
  </div>
</body>
</html>
