<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard - Baby Typewriting Institute</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="script.js" defer></script>
  <style>
    nav {
      background-color: #004080;
      padding: 15px;
      display: flex;
      gap: 15px;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Login</a>
    <a href="register.html">Register</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="admin.html">Admin</a>
  </nav>

  <h2>Welcome to Your Student Dashboard</h2>

  <!-- Attendance Check -->
  <section>
    <h3>Attendance</h3>
    <button onclick="checkIn()">Check In</button>
    <button onclick="checkOut()">Check Out</button>
    <p id="attendance-status"></p>
  </section>
  <hr>
  <!-- Course List -->
  <section>
    <h3>Your Courses</h3>
    <ul id="course-list">
      <!-- Course items will be dynamically added here -->
    </ul>
    <button onclick="loadCourses()">Load Courses</button>
  </section>
  <hr>
  <!-- Payment Status -->
  <section>
    <h3>Payment Status</h3>
    <ul id="payment-status">
      <!-- Payment items will be dynamically added here -->
    </ul>
    <button onclick="loadPayments()">Load Payments</button>
  </section>
  <hr>
  <!-- Contact Information -->
